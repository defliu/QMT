# coding: utf-8
# V1.0 migrated by migrate_yaml_to_v10.py
# P2.1: top-50 static (从 core_100 取前 50)，作为 top-50 PIT 的静态对照
backtest:
  name: p2_1_static_top50
  start_date: "2025-01-01"
  end_date:   "2026-06-11"
  initial_cash: 1000000.0
  benchmark_code: null

data:
  source: qmt_self_owned
  path:   "F:/backtest_workspace/data/duckdb/qmt_market_data.duckdb"
  adjustment: hfq

universe:
  csv: "backtest/data/universe/core_50_static.csv"

execution:
  price: next_open
  slippage: 0.001
  commission_rate: 0.00025
  tax_rate: 0.0001

strategy_params:
  max_positions: 5
  rebalance_policy: daily
  min_score: 60.0
  min_core: 32.0
  max_bias5: 10.0
  max_daily_pct: 9.0
  sector_heat_mode: zero
  score_gap_threshold: 15.0
  early_stop_days: 3
  early_stop_loss: -0.05
  stop_loss: -0.08
  warning_score_threshold: 50.0
  early_stop_holding_days: 5
  early_stop_min_return: 0.03
