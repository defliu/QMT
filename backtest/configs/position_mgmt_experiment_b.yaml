backtest:
  name: position_mgmt_experiment_b
  start_date: "2025-09-01"
  end_date:   "2026-06-10"
  initial_cash: 100000.0
  benchmark_code: null

data:
  source: qmt_self_owned
  path:   "/mnt/f/backtest_workspace/data/duckdb/qmt_market_data.duckdb"
  adjustment: hfq

universe:
  csv: "backtest/data/universe/strategy_pool_base.csv"

execution:
